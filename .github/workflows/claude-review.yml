name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    # PR-open events always run; comment events only re-review when a human
    # writes "@claude" on a pull request (ignores the bot's own comments).
    if: >
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1
          # issue_comment events default to the default branch; pin to the PR
          # merge ref so the review always runs against the PR diff.
          ref: refs/pull/${{ github.event.pull_request.number || github.event.issue.number }}/merge
      - uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            Review this pull request for correctness bugs, security issues, and
            notable code-quality problems. Only flag noteworthy items; skip
            nitpicks.

            For every specific finding you MUST call
            mcp__github_inline_comment__create_inline_comment to attach the
            comment to the exact file and line. Do not list specific findings
            in the top-level summary body. Reserve the top-level comment for a
            one-paragraph overall summary and a count of issues found. If a
            finding cannot be tied to a line, omit it. Keep feedback concise.
          claude_args: |
            --allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Read,Grep,Glob"
